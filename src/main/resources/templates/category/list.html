<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/main :: layout(~{::title}, ~{::content}, ~{::styles}, ~{})}">
<head>
    <title>Categories - JK1</title>
</head>
<body>
    <th:block th:fragment="styles">
        <link rel="stylesheet" th:href="@{/css/pages/category.css}">
    </th:block>

    <div th:fragment="content" class="container py-5 mt-4">
        <div th:replace="~{fragments/breadcrumb :: breadcrumb('Categories')}"></div>
        
        <div class="category-banner mt-2 shadow-sm" data-aos="fade-up">
            <img src="https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?q=80&w=2070" alt="Categories Banner">
            <div class="category-banner-overlay"></div>
            <div class="category-banner-content text-white">
                <h1 class="display-4 fw-bold font-poppins mb-3">Shop by Category</h1>
                <p class="lead mb-0 opacity-75" style="max-width: 500px;">Explore our curated collections of premium fashion and accessories tailored for your lifestyle.</p>
            </div>
        </div>

        <div class="row g-4 mt-4">
            <div class="col-lg-4 col-md-6" th:each="category : ${categories}" data-aos="zoom-in">
                <a th:href="@{/products/category/{id}(id=${category.id})}" class="category-list-card bg-white h-100">
                    <img th:src="${category.imageUrl}" th:alt="${category.name}">
                    <div class="category-list-content text-center">
                        <h4 class="fw-bold font-poppins text-dark mb-2" th:text="${category.name}">Category Name</h4>
                        <p class="text-muted text-sm mb-0" th:text="${category.description}">Category description goes here.</p>
                        <div class="mt-3 text-primary fw-medium text-sm">
                            Explore <i class="bi bi-arrow-right ms-1"></i>
                        </div>
                    </div>
                </a>
            </div>
            
            <div th:if="${categories.empty}" class="col-12 text-center py-5">
                <h4 class="fw-bold font-poppins text-muted">No Categories Found</h4>
            </div>
        </div>
    
    <!-- JS Integration -->
    <script type="module" th:src="@{/js/app.js}"></script>
    <script type="module" th:src="@{/js/pages/category/list.js}"></script>
    </div>
</body>
</html>
