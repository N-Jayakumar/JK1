<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{customer/layout :: html(title='Notifications | JKØ', activeTab='notifications', content=~{::content})}">
<head>
    <title>Notifications | JKØ</title>
</head>
<body>
    <div th:fragment="content">
        <div class="mb-5 d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bold mb-1" style="font-family: 'Playfair Display', serif; letter-spacing: 1px;">Notifications</h2>
                <p class="text-muted mb-0">Stay updated on your account and orders</p>
            </div>
        </div>

        <div th:if="${notifications == null || notifications.isEmpty()}" class="text-center py-5 bg-white rounded-4 shadow-sm border-0">
            <i class="bi bi-bell-slash display-1 text-muted mb-3 opacity-25"></i>
            <h4 class="fw-bold">No Notifications</h4>
            <p class="text-muted mb-0">You're all caught up! There are no new notifications to display.</p>
        </div>

        <div th:if="${notifications != null && !notifications.isEmpty()}">
            <div class="card border-0 shadow-sm rounded-4 mb-3 overflow-hidden" 
                 th:each="notification : ${notifications}"
                 th:classappend="${!notification.read} ? 'border border-dark' : ''">
                
                <div class="card-body p-4 d-flex align-items-start">
                    <div class="flex-shrink-0 me-4">
                        <div class="rounded-circle d-flex align-items-center justify-content-center text-white" 
                             style="width: 50px; height: 50px;"
                             th:classappend="${notification.type.name() == 'ORDER'} ? 'bg-dark' : (${notification.type.name() == 'PROMOTION'} ? 'bg-warning text-dark' : 'bg-secondary')">
                            
                            <i class="bi fs-5" th:classappend="${notification.type.name() == 'ORDER'} ? 'bi-box-seam' : (${notification.type.name() == 'PROMOTION'} ? 'bi-star' : 'bi-info-circle')"></i>
                        </div>
                    </div>
                    
                    <div class="flex-grow-1">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <h6 class="fw-bold mb-0" th:text="${notification.title}">Notification Title</h6>
                            <small class="text-muted" th:text="${#temporals.format(notification.createdAt, 'MMM dd, hh:mm a')}">Time</small>
                        </div>
                        <p class="text-muted mb-3" th:text="${notification.message}">Message details here...</p>
                        
                        <div th:if="${!notification.read}">
                            <form th:action="@{/account/notifications/{id}/read(id=${notification.id})}" method="post">
                                <button type="submit" class="btn btn-outline-dark btn-sm rounded-pill text-uppercase fw-semibold" style="font-size: 0.7rem; letter-spacing: 1px;">Mark as Read</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    
    <!-- JS Integration -->
    <script type="module" th:src="@{/js/app.js}"></script>
    <script type="module" th:src="@{/js/pages/customer/notifications.js}"></script>
    </div>
</body>
</html>
