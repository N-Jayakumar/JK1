<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{customer/layout :: html(title='Security & Settings | JKØ', activeTab='settings', content=~{::content})}">
<head>
    <title>Security & Settings | JKØ</title>
</head>
<body>
    <div th:fragment="content">
        <div class="mb-5">
            <h2 class="fw-bold mb-1" style="font-family: 'Playfair Display', serif; letter-spacing: 1px;">Security & Settings</h2>
            <p class="text-muted mb-0">Manage your account security and preferences</p>
        </div>

        <div th:if="${success}" class="alert alert-success border-0 rounded-4 mb-4 d-flex align-items-center" role="alert">
            <i class="bi bi-shield-check fs-5 me-3"></i>
            <div th:text="${success}"></div>
        </div>
        
        <div th:if="${error}" class="alert alert-danger border-0 rounded-4 mb-4 d-flex align-items-center" role="alert">
            <i class="bi bi-exclamation-triangle fs-5 me-3"></i>
            <div th:text="${error}"></div>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <h5 class="fw-bold text-uppercase mb-4" style="letter-spacing: 1px; font-size: 1rem;">Change Password</h5>
                
                <form th:action="@{/account/settings/password}" th:object="${passwordDto}" method="post">
                    
                    <div class="mb-4">
                        <label for="oldPassword" class="form-label text-uppercase text-muted" style="font-size: 0.75rem; letter-spacing: 1px;">Current Password</label>
                        <input type="password" class="form-control form-control-lg bg-light border-0 px-4" id="oldPassword" th:field="*{oldPassword}" placeholder="Enter current password">
                        <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}"></div>
                    </div>
                    
                    <div class="row g-4 mb-5">
                        <div class="col-md-6">
                            <label for="newPassword" class="form-label text-uppercase text-muted" style="font-size: 0.75rem; letter-spacing: 1px;">New Password</label>
                            <input type="password" class="form-control form-control-lg bg-light border-0 px-4" id="newPassword" th:field="*{newPassword}" placeholder="Enter new password">
                            <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="confirmPassword" class="form-label text-uppercase text-muted" style="font-size: 0.75rem; letter-spacing: 1px;">Confirm New Password</label>
                            <input type="password" class="form-control form-control-lg bg-light border-0 px-4" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Confirm new password">
                            <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                        </div>
                    </div>
                    
                    <div>
                        <button type="submit" class="btn btn-dark rounded-pill px-5 py-3 text-uppercase fw-semibold" style="letter-spacing: 1px;">Update Password</button>
                    </div>
                </form>
            </div>
        </div>
    
    <!-- JS Integration -->
    <script type="module" th:src="@{/js/app.js}"></script>
    <script type="module" th:src="@{/js/pages/customer/settings.js}"></script>
    </div>
</body>
</html>
