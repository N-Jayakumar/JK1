<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{customer/layout :: html(title='My Addresses | JKØ', activeTab='addresses', content=~{::content})}">
<head>
    <title>My Addresses | JKØ</title>
</head>
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="fw-bold mb-1" style="font-family: 'Playfair Display', serif; letter-spacing: 1px;">My Addresses</h2>
                <p class="text-muted mb-0">Manage your shipping addresses</p>
            </div>
            <a th:href="@{/account/addresses/new}" class="btn btn-dark rounded-pill px-4 py-2 text-uppercase" style="letter-spacing: 1px; font-size: 0.85rem;">
                <i class="bi bi-plus-lg me-2"></i> Add New
            </a>
        </div>

        <div th:if="${addresses == null || addresses.isEmpty()}" class="text-center py-5 bg-white rounded-4 shadow-sm border-0">
            <i class="bi bi-geo-alt display-1 text-muted mb-3 opacity-25"></i>
            <h4 class="fw-bold">No Addresses Found</h4>
            <p class="text-muted mb-4">You haven't saved any addresses yet.</p>
            <a th:href="@{/account/addresses/new}" class="btn btn-outline-dark rounded-pill px-4">Add Your First Address</a>
        </div>

        <div class="row g-4" th:if="${addresses != null && !addresses.isEmpty()}">
            <div class="col-md-6" th:each="address : ${addresses}">
                <div class="card h-100 border-0 shadow-sm rounded-4 position-relative overflow-hidden" 
                     th:classappend="${address.default} ? 'border border-2 border-dark' : ''">
                    
                    <div th:if="${address.default}" class="position-absolute top-0 end-0 bg-dark text-white px-3 py-1 rounded-bl-4" style="font-size: 0.75rem; letter-spacing: 1px; border-bottom-left-radius: 12px;">
                        DEFAULT
                    </div>
                    
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center mb-3">
                            <div class="bg-light rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px;">
                                <i class="bi" th:classappend="${address.addressType == 'Home' ? 'bi-house' : (address.addressType == 'Office' ? 'bi-building' : 'bi-geo-alt')}"></i>
                            </div>
                            <h5 class="fw-bold mb-0 text-uppercase" style="letter-spacing: 1px; font-size: 0.9rem;" th:text="${address.addressType}">Home</h5>
                        </div>
                        
                        <p class="card-text text-muted mb-1" th:text="${address.street}">123 Main St</p>
                        <p class="card-text text-muted mb-1"><span th:text="${address.city}">City</span>, <span th:text="${address.state}">State</span> <span th:text="${address.zipCode}">10001</span></p>
                        <p class="card-text text-muted mb-4" th:text="${address.country}">Country</p>
                        
                        <div class="d-flex gap-2 mt-auto">
                            <form th:if="${!address.default}" th:action="@{/account/addresses/{id}/default(id=${address.id})}" method="post" class="flex-grow-1">
                                <button type="submit" class="btn btn-outline-dark btn-sm w-100 rounded-pill">Set Default</button>
                            </form>
                            <button th:if="${address.default}" class="btn btn-dark btn-sm w-100 rounded-pill flex-grow-1" disabled>Default Address</button>
                            
                            <form th:action="@{/account/addresses/{id}/delete(id=${address.id})}" method="post">
                                <button type="submit" class="btn btn-outline-danger btn-sm rounded-circle d-flex align-items-center justify-content-center" style="width: 31px; height: 31px;" data-confirm="Are you sure you want to delete this address?">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    
    <!-- JS Integration -->
    <script type="module" th:src="@{/js/app.js}"></script>
    <script type="module" th:src="@{/js/pages/customer/address-book.js}"></script>
    </div>
</body>
</html>
