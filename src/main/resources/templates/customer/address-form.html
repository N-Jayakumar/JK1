<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{customer/layout :: html(title='Add New Address | JKØ', activeTab='addresses', content=~{::content})}">
<head>
    <title>Add New Address | JKØ</title>
</head>
<body>
    <div th:fragment="content">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <h3 class="fw-bold mb-4" style="font-family: 'Playfair Display', serif; letter-spacing: 1px;">Add New Address</h3>
                
                <form th:action="@{/account/addresses/save}" th:object="${addressDto}" method="post" class="needs-validation" novalidate>
                    
                    <div class="mb-4">
                        <label class="form-label text-uppercase text-muted" style="font-size: 0.75rem; letter-spacing: 1px;">Address Type</label>
                        <div class="d-flex gap-3 flex-wrap flex-md-nowrap">
                            <div class="form-check custom-radio flex-grow-1 w-100">
                                <input type="radio" class="btn-check" name="addressType" id="typeHome" value="Home" th:field="*{addressType}" checked required>
                                <label class="btn btn-outline-dark w-100 rounded-pill py-2" for="typeHome">
                                    <i class="bi bi-house me-2"></i> Home
                                </label>
                            </div>
                            <div class="form-check custom-radio flex-grow-1 w-100">
                                <input type="radio" class="btn-check" name="addressType" id="typeOffice" value="Office" th:field="*{addressType}" required>
                                <label class="btn btn-outline-dark w-100 rounded-pill py-2" for="typeOffice">
                                    <i class="bi bi-building me-2"></i> Office
                                </label>
                            </div>
                            <div class="form-check custom-radio flex-grow-1 w-100">
                                <input type="radio" class="btn-check" name="addressType" id="typeOther" value="Other" th:field="*{addressType}" required>
                                <label class="btn btn-outline-dark w-100 rounded-pill py-2" for="typeOther">
                                    <i class="bi bi-geo-alt me-2"></i> Other
                                </label>
                            </div>
                        </div>
                        <div class="invalid-feedback">Please select an address type.</div>
                        <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('addressType')}" th:errors="*{addressType}"></div>
                    </div>

                    <div class="mb-4">
                        <label for="street" class="form-label text-uppercase text-muted" style="font-size: 0.75rem; letter-spacing: 1px;">Street Address</label>
                        <input type="text" class="form-control form-control-lg bg-light border-0 px-4" id="street" th:field="*{street}" placeholder="123 Main St, Apt 4B" required>
                        <div class="invalid-feedback">Please enter a valid street address.</div>
                        <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('street')}" th:errors="*{street}"></div>
                    </div>
                    
                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label for="city" class="form-label text-uppercase text-muted" style="font-size: 0.75rem; letter-spacing: 1px;">City</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0 px-4" id="city" th:field="*{city}" placeholder="New York" required>
                            <div class="invalid-feedback">Please enter your city.</div>
                            <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="state" class="form-label text-uppercase text-muted" style="font-size: 0.75rem; letter-spacing: 1px;">State / Province</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0 px-4" id="state" th:field="*{state}" placeholder="NY" required>
                            <div class="invalid-feedback">Please enter your state or province.</div>
                            <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('state')}" th:errors="*{state}"></div>
                        </div>
                    </div>
                    
                    <div class="row g-4 mb-5">
                        <div class="col-md-6">
                            <label for="zipCode" class="form-label text-uppercase text-muted" style="font-size: 0.75rem; letter-spacing: 1px;">Zip Code</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0 px-4" id="zipCode" th:field="*{zipCode}" placeholder="10001" required>
                            <div class="invalid-feedback">Please enter a valid zip code.</div>
                            <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('zipCode')}" th:errors="*{zipCode}"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="country" class="form-label text-uppercase text-muted" style="font-size: 0.75rem; letter-spacing: 1px;">Country</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0 px-4" id="country" th:field="*{country}" placeholder="United States" required>
                            <div class="invalid-feedback">Please enter your country.</div>
                            <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('country')}" th:errors="*{country}"></div>
                        </div>
                    </div>
                    
                    <div class="form-check mb-5">
                        <input class="form-check-input" type="checkbox" id="isDefault" th:field="*{default}">
                        <label class="form-check-label" for="isDefault">
                            Set as default shipping address
                        </label>
                    </div>

                    <div class="d-flex gap-3">
                        <a th:href="@{/account/addresses}" class="btn btn-light rounded-pill px-4 py-3 flex-grow-1 text-uppercase fw-semibold text-center" style="letter-spacing: 1px;">Cancel</a>
                        <button type="submit" class="btn btn-dark rounded-pill px-4 py-3 flex-grow-1 text-uppercase fw-semibold" style="letter-spacing: 1px;">Save Address</button>
                    </div>
                </form>
            </div>
        </div>
    
    <!-- JS Integration -->
    <script type="module" th:src="@{/js/app.js}"></script>
    <script type="module" th:src="@{/js/pages/customer/address-form.js}"></script>
    </div>
</body>
</html>
