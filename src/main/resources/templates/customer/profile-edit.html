<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{customer/layout :: html(title='Edit Profile | JKØ', activeTab='profile', content=~{::content})}">
<head>
    <title>Edit Profile | JKØ</title>
</head>
<body>
    <div th:fragment="content">
        <div class="mb-4">
            <a th:href="@{/account/profile}" class="text-decoration-none text-dark small fw-bold text-uppercase" style="letter-spacing: 1px;">
                <i class="bi bi-arrow-left me-1"></i> Back to Profile
            </a>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <h3 class="fw-bold mb-4" style="font-family: 'Playfair Display', serif; letter-spacing: 1px;">Edit Profile</h3>
                
                <div th:if="${error}" class="alert alert-danger border-0 rounded-4 mb-4" role="alert" th:text="${error}"></div>
                
                <form th:action="@{/account/profile/edit}" th:object="${userDto}" method="post">
                    
                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label for="firstName" class="form-label text-uppercase text-muted" style="font-size: 0.75rem; letter-spacing: 1px;">First Name</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0 px-4" id="firstName" th:field="*{firstName}" placeholder="First Name">
                            <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="lastName" class="form-label text-uppercase text-muted" style="font-size: 0.75rem; letter-spacing: 1px;">Last Name</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0 px-4" id="lastName" th:field="*{lastName}" placeholder="Last Name">
                            <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                        </div>
                    </div>
                    
                    <div class="row g-4 mb-5">
                        <div class="col-md-6">
                            <label for="email" class="form-label text-uppercase text-muted" style="font-size: 0.75rem; letter-spacing: 1px;">Email Address</label>
                            <input type="email" class="form-control form-control-lg bg-light border-0 px-4 text-muted" id="email" th:field="*{email}" readonly>
                            <div class="form-text small">Email address cannot be changed.</div>
                        </div>
                        <div class="col-md-6">
                            <label for="phone" class="form-label text-uppercase text-muted" style="font-size: 0.75rem; letter-spacing: 1px;">Phone Number</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0 px-4" id="phone" th:field="*{phone}" placeholder="Phone Number">
                            <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                        </div>
                    </div>
                    
                    <div class="d-flex gap-3">
                        <a th:href="@{/account/profile}" class="btn btn-light rounded-pill px-4 py-3 flex-grow-1 text-uppercase fw-semibold text-center" style="letter-spacing: 1px;">Cancel</a>
                        <button type="submit" class="btn btn-dark rounded-pill px-4 py-3 flex-grow-1 text-uppercase fw-semibold" style="letter-spacing: 1px;">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    
    <!-- JS Integration -->
    <script type="module" th:src="@{/js/app.js}"></script>
    <script type="module" th:src="@{/js/pages/customer/profile-edit.js}"></script>
    </div>
</body>
</html>
