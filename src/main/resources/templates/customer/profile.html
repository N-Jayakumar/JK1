<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{customer/layout :: html(title='My Profile | JKØ', activeTab='profile', content=~{::content})}">
<head>
    <title>My Profile | JKØ</title>
</head>
<body>
    <div th:fragment="content">
        <div class="mb-5 d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bold mb-1" style="font-family: 'Playfair Display', serif; letter-spacing: 1px;">My Profile</h2>
                <p class="text-muted mb-0">View and manage your personal information</p>
            </div>
            <a th:href="@{/account/profile/edit}" class="btn btn-dark rounded-pill px-4 text-uppercase fw-semibold" style="letter-spacing: 1px; font-size: 0.85rem;">
                <i class="bi bi-pencil me-2"></i> Edit Profile
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success border-0 rounded-4 mb-4 d-flex align-items-center" role="alert">
            <i class="bi bi-check-circle-fill fs-5 me-3"></i>
            <div th:text="${success}"></div>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <div class="row align-items-center mb-5 pb-5 border-bottom">
                    <div class="col-md-auto text-center mb-4 mb-md-0">
                        <div class="bg-dark text-white rounded-circle d-flex align-items-center justify-content-center mx-auto" style="width: 100px; height: 100px; font-size: 2.5rem; font-family: 'Playfair Display', serif;">
                            <span th:text="${(#strings.isEmpty(user.firstName) ? '' : #strings.substring(user.firstName,0,1).toUpperCase()) + (#strings.isEmpty(user.lastName) ? '' : #strings.substring(user.lastName,0,1).toUpperCase())}">JD</span>
                        </div>
                    </div>
                    <div class="col-md text-center text-md-start ps-md-4">
                        <h3 class="fw-bold mb-1" th:text="${user.firstName + ' ' + user.lastName}">John Doe</h3>
                        <p class="text-muted mb-2"><i class="bi bi-envelope me-2"></i> <span th:text="${user.email}">john@example.com</span></p>
                        <span class="badge bg-light text-dark border px-3 py-2 text-uppercase fw-semibold" style="letter-spacing: 1px; font-size: 0.75rem;">Premium Member</span>
                    </div>
                </div>

                <div class="row g-5">
                    <div class="col-md-6">
                        <h6 class="text-uppercase text-muted fw-semibold mb-4" style="letter-spacing: 1px; font-size: 0.8rem;">Personal Details</h6>
                        
                        <div class="mb-4">
                            <span class="d-block text-muted small text-uppercase mb-1" style="letter-spacing: 1px;">First Name</span>
                            <span class="fw-semibold fs-5" th:text="${user.firstName}">John</span>
                        </div>
                        <div class="mb-4">
                            <span class="d-block text-muted small text-uppercase mb-1" style="letter-spacing: 1px;">Last Name</span>
                            <span class="fw-semibold fs-5" th:text="${user.lastName}">Doe</span>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <h6 class="text-uppercase text-muted fw-semibold mb-4" style="letter-spacing: 1px; font-size: 0.8rem;">Contact Information</h6>
                        
                        <div class="mb-4">
                            <span class="d-block text-muted small text-uppercase mb-1" style="letter-spacing: 1px;">Email Address</span>
                            <span class="fw-semibold fs-5" th:text="${user.email}">john@example.com</span>
                        </div>
                        <div class="mb-4">
                            <span class="d-block text-muted small text-uppercase mb-1" style="letter-spacing: 1px;">Phone Number</span>
                            <span class="fw-semibold fs-5" th:text="${user.phone != null ? user.phone : 'Not provided'}">+1 234 567 8900</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    
    <!-- JS Integration -->
    <script type="module" th:src="@{/js/app.js}"></script>
    <script type="module" th:src="@{/js/pages/customer/profile.js}"></script>
    </div>
</body>
</html>
