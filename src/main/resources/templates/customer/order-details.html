<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{customer/layout :: html(title='Order Details | JKØ', activeTab='orders', content=~{::content})}">
<head>
    <title>Order Details | JKØ</title>
</head>
<body>
    <div th:fragment="content">
        <div class="mb-4">
            <a th:href="@{/account/orders}" class="text-decoration-none text-dark small fw-bold text-uppercase" style="letter-spacing: 1px;">
                <i class="bi bi-arrow-left me-1"></i> Back to Orders
            </a>
        </div>

        <div class="row align-items-center mb-5">
            <div class="col-md-6">
                <h3 class="fw-bold mb-1" style="font-family: 'Playfair Display', serif; letter-spacing: 1px;">Order Details</h3>
                <p class="text-muted mb-0 font-monospace">Order #<span th:text="${order.orderNumber}">123</span></p>
            </div>
            <div class="col-md-6 text-md-end mt-3 mt-md-0">
                <span class="badge rounded-pill px-4 py-2 text-uppercase fs-6" 
                      th:classappend="${order.orderStatus.name() == 'DELIVERED'} ? 'bg-success' : (${order.orderStatus.name() == 'PENDING'} ? 'bg-warning text-dark' : 'bg-dark')"
                      style="letter-spacing: 1.5px;"
                      th:text="${order.orderStatus}">STATUS</span>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-xl-8">
                <!-- Items -->
                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-header bg-white border-bottom-0 pt-4 px-4">
                        <h5 class="fw-bold text-uppercase mb-0" style="letter-spacing: 1px; font-size: 1rem;">Items Ordered</h5>
                    </div>
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center border-bottom pb-3 mb-3" th:each="item : ${order.items}">
                            <div class="flex-shrink-0 bg-light rounded-3 overflow-hidden me-4" style="width: 80px; height: 80px;">
                                <img th:if="${!item.product.images.isEmpty()}" th:src="${item.product.images[0].imageUrl}" class="w-100 h-100 object-fit-cover">
                                <div th:if="${item.product.images.isEmpty()}" class="w-100 h-100 d-flex align-items-center justify-content-center bg-light text-muted">
                                    <i class="bi bi-image fs-4"></i>
                                </div>
                            </div>
                            <div class="flex-grow-1">
                                <h6 class="fw-bold mb-1"><a th:href="@{/products/{id}(id=${item.product.id})}" class="text-dark text-decoration-none" th:text="${item.product.name}">Product</a></h6>
                                <p class="text-muted small mb-0">Qty: <span th:text="${item.quantity}">1</span> | Price: $<span th:text="${item.price}">0.00</span></p>
                            </div>
                            <div class="fw-bold fs-5" style="font-family: 'Playfair Display', serif;">
                                $<span th:text="${item.price * item.quantity}">0.00</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-xl-4">
                <!-- Order Summary -->
                <div class="card border-0 bg-light rounded-4 mb-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold text-uppercase mb-4" style="letter-spacing: 1px; font-size: 1rem;">Summary</h5>
                        
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Subtotal</span>
                            <span>₹<span th:text="${order.totalAmount}">0.00</span></span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Shipping</span>
                            <span>Free</span>
                        </div>
                        <hr class="opacity-10 border-dark">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="fw-bold text-uppercase" style="letter-spacing: 1px;">Total</span>
                            <span class="fs-4 fw-bold" style="font-family: 'Playfair Display', serif;">₹<span th:text="${order.totalAmount}">0.00</span></span>
                        </div>
                    </div>
                </div>

                <!-- Shipping & Payment -->
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-4">
                        <div class="mb-4">
                            <h6 class="fw-bold text-uppercase mb-3 text-muted" style="letter-spacing: 1px; font-size: 0.8rem;">Shipping Address</h6>
                            <p class="mb-0 fw-bold" th:text="${order.shippingAddress.addressType}">Home</p>
                            <p class="mb-0 small" th:text="${order.shippingAddress.street}">Street</p>
                            <p class="mb-0 small"><span th:text="${order.shippingAddress.city}">City</span>, <span th:text="${order.shippingAddress.state}">State</span> <span th:text="${order.shippingAddress.zipCode}">Zip</span></p>
                            <p class="mb-0 small" th:text="${order.shippingAddress.country}">Country</p>
                        </div>
                        
                        <div>
                            <h6 class="fw-bold text-uppercase mb-3 text-muted" style="letter-spacing: 1px; font-size: 0.8rem;">Payment Method</h6>
                            <div class="d-flex align-items-center">
                                <i class="bi bi-credit-card me-2 fs-5" th:if="${order.payment != null && order.payment.paymentMethod.name() != 'CASH_ON_DELIVERY'}"></i>
                                <i class="bi bi-cash me-2 fs-5" th:if="${order.payment != null && order.payment.paymentMethod.name() == 'CASH_ON_DELIVERY'}"></i>
                                <span class="small fw-semibold" th:text="${order.payment != null ? order.payment.paymentMethod : 'PENDING'}">CASH_ON_DELIVERY</span>
                            </div>
                            <div class="mt-2">
                                <span class="badge" th:classappend="${order.payment != null && order.payment.paymentStatus.name() == 'COMPLETED'} ? 'bg-success' : 'bg-warning text-dark'" th:text="${order.payment != null ? order.payment.paymentStatus : 'PENDING'}">PENDING</span>
                            </div>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
        
        <div class="text-center mt-5" th:if="${order.orderStatus.name() == 'DELIVERED'}">
            <button class="btn btn-outline-dark rounded-pill px-4 text-uppercase" style="letter-spacing: 1px;"><i class="bi bi-download me-2"></i> Download Invoice</button>
        </div>
    
    <!-- JS Integration -->
    <script type="module" th:src="@{/js/app.js}"></script>
    <script type="module" th:src="@{/js/pages/customer/order-details.js}"></script>
    </div>
</body>
</html>
