<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/main :: layout(title=${title}, content=~{::content}, styles=~{}, scripts=~{::scripts})}" th:fragment="html(title, activeTab, content)">
<head>
    <title th:text="${title}">Customer Portal | JKØ</title>
</head>
<body>
    <div th:fragment="content">
        <div class="container py-5">
            <div class="row g-5">
                <!-- Sidebar Toggle for Mobile (Alpine.js) -->
                <div class="col-12 d-lg-none mb-3" x-data="{ sidebarOpen: false }">
                    <button @click="sidebarOpen = !sidebarOpen" class="btn btn-dark w-100 rounded-pill py-3 text-uppercase fw-semibold d-flex justify-content-between align-items-center" style="letter-spacing: 1px;">
                        <span><i class="bi bi-list me-2"></i> Menu</span>
                        <i class="bi" :class="sidebarOpen ? 'bi-chevron-up' : 'bi-chevron-down'"></i>
                    </button>
                    <div x-show="sidebarOpen" x-transition.duration.300ms class="mt-4" style="display: none;">
                        <div th:replace="~{customer/fragments/sidebar :: sidebar(activeTab=${activeTab})}"></div>
                    </div>
                </div>

                <!-- Desktop Sidebar -->
                <div class="col-lg-3 d-none d-lg-block">
                    <div th:replace="~{customer/fragments/sidebar :: sidebar(activeTab=${activeTab})}"></div>
                </div>

                <!-- Main Content Area -->
                <div class="col-lg-9">
                    <div th:replace="${content}"></div>
                </div>
            </div>
        </div>
    </div>
    
    <th:block th:fragment="scripts">
        <script type="module" th:src="@{/js/app.js}"></script>
        <script type="module" th:src="@{/js/pages/customer/layout.js}"></script>
    </th:block>
</body>
</html>
