<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::title}, ~{::content}, ~{::styles}, ~{::scripts})}">
<head>
    <title>My Wishlist - JK1</title>
</head>
<body>
<th:block th:fragment="styles">
    <style>
        .wishlist-card { transition: transform 0.2s, box-shadow 0.2s; }
        .wishlist-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.12) !important; }
        .empty-wishlist-icon { font-size: 5rem; opacity: 0.15; }
        .wishlist-image-wrap { aspect-ratio: 3/4; overflow: hidden; background: #f8f9ff; }
        .wishlist-image-wrap img { object-fit: cover; width: 100%; height: 100%; mix-blend-multiply; transition: transform 0.4s; }
        .wishlist-card:hover .wishlist-image-wrap img { transform: scale(1.05); }
    </style>
</th:block>

<div th:fragment="content" class="container py-5 mt-4">
    <div th:replace="~{fragments/breadcrumb :: breadcrumb('Wishlist')}"></div>

    <!-- Flash Messages -->
    <div th:if="${wishlistSuccess}" class="alert alert-success alert-dismissible fade show rounded-4 border-0 shadow-sm mb-4" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${wishlistSuccess}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${wishlistError}" class="alert alert-danger alert-dismissible fade show rounded-4 border-0 shadow-sm mb-4" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${wishlistError}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row mb-5 align-items-center">
        <div class="col">
            <h1 class="fw-bold font-poppins mb-1">My Wishlist</h1>
            <p class="text-muted mb-0"
               th:text="${wishlist != null and wishlist.products != null ? wishlist.products.size() + ' item(s) saved' : 'Your wishlist is empty'}">
                0 items saved
            </p>
        </div>
        <div class="col-auto">
            <a th:href="@{/products}" class="btn btn-outline-primary rounded-pill px-4">
                <i class="bi bi-bag me-2"></i>Continue Shopping
            </a>
        </div>
    </div>

    <!-- ── EMPTY STATE ─────────────────────────────────────────────────────── -->
    <div th:if="${wishlist == null or #lists.isEmpty(wishlist.products)}"
         class="text-center py-5 my-5">
        <div class="empty-wishlist-icon mb-4">
            <i class="bi bi-heart display-1 text-muted"></i>
        </div>
        <h3 class="fw-bold font-poppins mb-2">Your wishlist is empty</h3>
        <p class="text-muted mb-4">Save your favourite items here and shop whenever you're ready.</p>
        <a th:href="@{/products}" class="btn btn-primary btn-lg rounded-pill px-5 shadow-sm">
            <i class="bi bi-search me-2"></i>Explore Products
        </a>
    </div>

    <!-- ── WISHLIST GRID ───────────────────────────────────────────────────── -->
    <div th:if="${wishlist != null and not #lists.isEmpty(wishlist.products)}"
         class="row g-4">
        <div class="col-lg-3 col-md-4 col-sm-6"
             th:each="product : ${wishlist.products}">
            <div class="wishlist-card card border-0 shadow-sm rounded-4 overflow-hidden h-100">

                <!-- Image -->
                <div class="wishlist-image-wrap">
                    <a th:href="@{/products/{slug}(slug=${product.slug})}">
                        <img th:src="${product.images != null and not #lists.isEmpty(product.images) ? product.images[0].imageUrl : 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=400&auto=format&fit=crop'}"
                             th:alt="${product.name}"
                             class="p-3">
                    </a>
                </div>

                <!-- Info -->
                <div class="card-body p-3 text-center d-flex flex-column">
                    <p class="text-muted text-xs text-uppercase tracking-wider mb-1"
                       th:text="${product.category != null ? product.category.name : ''}">Category</p>
                    <h6 class="fw-bold font-poppins mb-1 text-truncate">
                        <a th:href="@{/products/{slug}(slug=${product.slug})}"
                           class="text-dark text-decoration-none"
                           th:text="${product.name}">Product Name</a>
                    </h6>
                    <p class="fw-bold text-primary mb-3 mt-auto"
                       th:text="|$${product.price}|">$0.00</p>

                    <!-- Actions -->
                    <div class="d-flex gap-2">
                        <!-- Move to Cart -->
                        <form th:action="@{/wishlist/move-to-cart/{id}(id=${product.id})}" method="post" class="flex-grow-1">
                            <button type="submit" class="btn btn-primary btn-sm w-100 rounded-pill fw-medium">
                                <i class="bi bi-cart-plus me-1"></i>Add to Cart
                            </button>
                        </form>
                        <!-- Remove -->
                        <form th:action="@{/wishlist/remove/{id}(id=${product.id})}" method="post">
                            <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill" title="Remove from wishlist">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:fragment="scripts">
    <script type="module" th:src="@{/js/app.js}"></script>
</th:block>
</body>
</html>
