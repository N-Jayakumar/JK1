<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::title}, ~{::content}, ~{}, ~{})}">
<head><title>500 – Server Error | JK1</title></head>
<body>
<div th:fragment="content" class="container py-5 text-center" style="min-height: 60vh; display:flex; align-items:center; justify-content:center; flex-direction:column;">
    <div style="font-size:6rem; opacity:0.12;" class="mb-3">
        <i class="bi bi-exclamation-octagon"></i>
    </div>
    <h1 class="display-1 fw-bold text-danger font-poppins">500</h1>
    <h2 class="fw-bold font-poppins mb-3">Something Went Wrong</h2>
    <p class="text-muted mb-5 mx-auto" style="max-width:480px;">
        An unexpected error occurred on our end. Our team has been notified.
        Please try again in a few moments.
    </p>
    <div class="d-flex gap-3 justify-content-center flex-wrap">
        <a th:href="@{/}" class="btn btn-primary rounded-pill px-5 fw-medium shadow-sm">
            <i class="bi bi-house me-2"></i>Go Home
        </a>
        <a onclick="history.back(); return false;" href="#"
           class="btn btn-outline-secondary rounded-pill px-5 fw-medium">
            <i class="bi bi-arrow-left me-2"></i>Go Back
        </a>
    </div>
</div>
</body>
</html>
