<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::title}, ~{::content}, ~{::styles}, ~{})}">
<head><title>404 – Page Not Found | JK1</title></head>
<body>
<div th:fragment="content" class="container py-5 text-center" style="min-height: 60vh; display:flex; align-items:center; justify-content:center; flex-direction:column;">
    <div style="font-size:6rem; opacity:0.12;" class="mb-3">
        <i class="bi bi-compass"></i>
    </div>
    <h1 class="display-1 fw-bold text-primary font-poppins">404</h1>
    <h2 class="fw-bold font-poppins mb-3">Page Not Found</h2>
    <p class="text-muted mb-5 mx-auto" style="max-width:480px;">
        The page you're looking for has moved, been removed, or never existed.
        Let's get you back on track.
    </p>
    <div class="d-flex gap-3 justify-content-center flex-wrap">
        <a th:href="@{/}" class="btn btn-primary rounded-pill px-5 fw-medium shadow-sm">
            <i class="bi bi-house me-2"></i>Go Home
        </a>
        <a th:href="@{/products}" class="btn btn-outline-primary rounded-pill px-5 fw-medium">
            <i class="bi bi-bag me-2"></i>Shop Now
        </a>
    </div>
</div>
</body>
</html>
