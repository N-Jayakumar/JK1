<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/main :: layout(title='Order Success | JKØ', content=~{::content}, styles=~{}, scripts=~{})}">
<head>
    <title>Order Success | JKØ</title>
</head>
<body>
    <div th:fragment="content">
        <div class="container py-5">
            <div class="row justify-content-center text-center">
                <div class="col-md-8 col-lg-6">
                    <div class="mb-4">
                        <i class="bi bi-check-circle-fill text-dark display-1"></i>
                    </div>
                    
                    <h2 class="fw-bold mb-3" style="font-family: 'Playfair Display', serif; letter-spacing: 1px;">Thank You for Your Order</h2>
                    <p class="text-muted fs-5 mb-5">Your premium selection is being prepared for dispatch.</p>
                    
                    <div class="card border-0 bg-light rounded-4 p-4 mb-5 text-start">
                        <div class="d-flex justify-content-between border-bottom pb-3 mb-3">
                            <span class="text-muted text-uppercase" style="font-size: 0.8rem; letter-spacing: 1px;">Order Number</span>
                            <span class="fw-bold font-monospace" th:text="${order.orderNumber}">#12345</span>
                        </div>
                        <div class="d-flex justify-content-between border-bottom pb-3 mb-3">
                            <span class="text-muted text-uppercase" style="font-size: 0.8rem; letter-spacing: 1px;">Date</span>
                            <span class="fw-bold" th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy')}">01 Jan 2026</span>
                        </div>
                        <div class="d-flex justify-content-between border-bottom pb-3 mb-3">
                            <span class="text-muted text-uppercase" style="font-size: 0.8rem; letter-spacing: 1px;">Total</span>
                            <span class="fw-bold">$<span th:text="${order.totalAmount}">0.00</span></span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="text-muted text-uppercase" style="font-size: 0.8rem; letter-spacing: 1px;">Payment Method</span>
                            <span class="fw-bold" th:text="${order.payment.paymentMethod}">CASH_ON_DELIVERY</span>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-center gap-3">
                        <a th:href="@{/account/orders/{id}(id=${order.orderNumber})}" class="btn btn-outline-dark rounded-pill px-4 py-2 text-uppercase fw-semibold" style="letter-spacing: 1px; font-size: 0.85rem;">View Order Details</a>
                        <a th:href="@{/}" class="btn btn-dark rounded-pill px-4 py-2 text-uppercase fw-semibold" style="letter-spacing: 1px; font-size: 0.85rem;">Continue Shopping</a>
                    </div>
                </div>
            </div>
        </div>
    
    <!-- JS Integration -->
    <script type="module" th:src="@{/js/app.js}"></script>
    <script type="module" th:src="@{/js/pages/order-success.js}"></script>
    </div>
</body>
</html>
