<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: html(title='Analytics | JKØ', activeTab='analytics', content=~{::content})}">
<head>
    <title>Business Analytics</title>
</head>
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0" style="font-family: 'Playfair Display', serif; letter-spacing: 1px;">Business Analytics</h3>
        </div>

        <!-- Metric Cards -->
        <div class="row g-4 mb-4">
            <div class="col-xl-4 col-md-6">
                <div class="card border-0 shadow-sm rounded-4 h-100 bg-dark text-white">
                    <div class="card-body p-4 d-flex flex-column justify-content-center">
                        <h6 class="text-uppercase text-white-50 fw-semibold mb-2" style="letter-spacing: 1px;">Total Revenue</h6>
                        <h2 class="fw-bold mb-0" th:text="${'₹' + totalRevenue}">₹0.00</h2>
                    </div>
                </div>
            </div>
            <div class="col-xl-4 col-md-6">
                <div class="card border-0 shadow-sm rounded-4 h-100">
                    <div class="card-body p-4 d-flex flex-column justify-content-center">
                        <h6 class="text-uppercase text-muted fw-semibold mb-2" style="letter-spacing: 1px;">Monthly Revenue</h6>
                        <h2 class="fw-bold mb-0" th:text="${'₹' + monthlyRevenue}">₹0.00</h2>
                    </div>
                </div>
            </div>
            <div class="col-xl-4 col-md-12">
                <div class="card border-0 shadow-sm rounded-4 h-100">
                    <div class="card-body p-4 d-flex flex-column justify-content-center">
                        <h6 class="text-uppercase text-muted fw-semibold mb-2" style="letter-spacing: 1px;">Today's Revenue</h6>
                        <h2 class="fw-bold mb-0 text-success" th:text="${'₹' + todayRevenue}">₹0.00</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- Line Chart: Sales Trend -->
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-4 h-100">
                    <div class="card-body p-4">
                        <h6 class="fw-bold text-uppercase mb-4" style="letter-spacing: 1px;">Sales Trend (Last 7 Days)</h6>
                        <canvas id="salesTrendChart" height="100"></canvas>
                    </div>
                </div>
            </div>
            
            <!-- Doughnut Chart: Order Status -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm rounded-4 h-100">
                    <div class="card-body p-4">
                        <h6 class="fw-bold text-uppercase mb-4" style="letter-spacing: 1px;">Order Status Breakdown</h6>
                        <canvas id="orderStatusChart" height="250"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chart.js Scripts -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script th:inline="javascript">
            // Sales Trend Chart
            const salesLabels = /*[[${salesTrendLabels}]]*/ [];
            const salesData = /*[[${salesTrendData}]]*/ [];
            
            new Chart(document.getElementById('salesTrendChart'), {
                type: 'line',
                data: {
                    labels: salesLabels,
                    datasets: [{
                        label: 'Revenue ($)',
                        data: salesData,
                        borderColor: '#212529',
                        backgroundColor: 'rgba(33, 37, 41, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { display: true, drawBorder: false } },
                        x: { grid: { display: false, drawBorder: false } }
                    }
                }
            });

            // Order Status Chart
            const statusLabels = /*[[${statusLabels}]]*/ [];
            const statusData = /*[[${statusData}]]*/ [];
            
            new Chart(document.getElementById('orderStatusChart'), {
                type: 'doughnut',
                data: {
                    labels: statusLabels,
                    datasets: [{
                        data: statusData,
                        backgroundColor: ['#212529', '#198754', '#ffc107', '#0dcaf0', '#dc3545', '#6c757d', '#6f42c1', '#fd7e14'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 12, padding: 15 } }
                    }
                }
            });
        </script>
    
    <!-- JS Integration -->
    <script type="module" th:src="@{/js/app.js}"></script>
    <script type="module" th:src="@{/js/pages/admin/analytics.js}"></script>
    </div>
</body>
</html>
