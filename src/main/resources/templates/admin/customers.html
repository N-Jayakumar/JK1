<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: html(title='Customers | JKØ', activeTab='customers', content=~{::content})}">
<head>
    <title>Customers</title>
</head>
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0" style="font-family: 'Playfair Display', serif; letter-spacing: 1px;">Customers</h3>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="bg-light text-uppercase text-muted" style="font-size: 0.75rem; letter-spacing: 1px;">
                        <tr>
                            <th class="py-3 px-4 fw-semibold border-0">Name</th>
                            <th class="py-3 fw-semibold border-0">Email</th>
                            <th class="py-3 fw-semibold border-0">Joined</th>
                            <th class="py-3 fw-semibold border-0">Status</th>
                            <th class="py-3 px-4 fw-semibold border-0 text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="customer : ${customerPage.content}">
                            <td class="py-3 px-4 fw-bold" th:text="${customer.firstName + ' ' + customer.lastName}">John Doe</td>
                            <td class="py-3 text-muted small" th:text="${customer.email}">john@example.com</td>
                            <td class="py-3 text-muted small" th:text="${#temporals.format(customer.createdAt, 'MMM dd, yyyy')}">Date</td>
                            <td class="py-3">
                                <span class="badge rounded-pill px-3 py-2 fw-semibold"
                                      th:classappend="${customer.accountStatus.name() == 'ACTIVE' ? 'bg-success' : 'bg-danger'}"
                                      th:text="${customer.accountStatus}">STATUS</span>
                            </td>
                            <td class="py-3 px-4 text-end">
                                <a th:href="@{/admin/customers/{id}(id=${customer.id})}" class="btn btn-sm btn-dark rounded-pill px-3">View</a>
                            </td>
                        </tr>
                        <tr th:if="${customerPage.empty}">
                            <td colspan="5" class="text-center py-5 text-muted">No customers found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="card-footer bg-white border-top py-3" th:if="${customerPage.totalPages > 1}">
                <nav>
                    <ul class="pagination justify-content-center mb-0">
                        <li class="page-item" th:classappend="${customerPage.first ? 'disabled' : ''}">
                            <a class="page-link rounded-circle border-0" th:href="@{/admin/customers(page=${customerPage.number - 1})}"><i class="bi bi-chevron-left"></i></a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, customerPage.totalPages - 1)}" th:classappend="${customerPage.number == i ? 'active' : ''}">
                            <a class="page-link rounded-circle border-0 mx-1" th:href="@{/admin/customers(page=${i})}" th:text="${i + 1}" th:classappend="${customerPage.number == i ? 'bg-dark text-white' : 'text-dark'}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${customerPage.last ? 'disabled' : ''}">
                            <a class="page-link rounded-circle border-0" th:href="@{/admin/customers(page=${customerPage.number + 1})}"><i class="bi bi-chevron-right"></i></a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    
    <!-- JS Integration -->
    <script type="module" th:src="@{/js/app.js}"></script>
    <script type="module" th:src="@{/js/pages/admin/customers.js}"></script>
    </div>
</body>
</html>
