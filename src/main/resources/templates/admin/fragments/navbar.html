<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="navbar" class="admin-nav d-flex justify-content-between align-items-center">
    
    <div class="d-flex align-items-center">
        <button @click="sidebarOpen = !sidebarOpen" class="btn btn-light d-lg-none me-3 rounded-circle" style="width: 40px; height: 40px;">
            <i class="bi bi-list"></i>
        </button>
        
        <!-- Global Admin Search Stub -->
        <div class="input-group d-none d-md-flex" style="width: 300px;">
            <span class="input-group-text bg-light border-end-0 rounded-start-pill text-muted">
                <i class="bi bi-search"></i>
            </span>
            <input type="text" class="form-control bg-light border-start-0 rounded-end-pill" placeholder="Search orders, products...">
        </div>
    </div>
    
    <div class="d-flex align-items-center gap-3">
        <a href="#" class="btn btn-light rounded-circle position-relative" style="width: 40px; height: 40px;">
            <i class="bi bi-bell"></i>
            <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle">
                <span class="visually-hidden">New alerts</span>
            </span>
        </a>
        
        <div class="dropdown">
            <button class="btn btn-light rounded-pill px-3 d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                <div class="bg-dark text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 24px; height: 24px; font-size: 0.7rem;">
                    <span th:text="${#authentication.principal.username.substring(0,1).toUpperCase()}">A</span>
                </div>
                <span class="fw-semibold small d-none d-sm-block" th:text="${#authentication.principal.username.split('@')[0]}">Admin</span>
                <i class="bi bi-chevron-down small text-muted"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-3 mt-2">
                <li><a class="dropdown-item" href="/account/profile"><i class="bi bi-person me-2"></i>My Profile</a></li>
                <li><a class="dropdown-item" href="/account/settings"><i class="bi bi-gear me-2"></i>Settings</a></li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="dropdown-item text-danger"><i class="bi bi-box-arrow-right me-2"></i>Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</div>
</html>
