<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="navbar" class="admin-nav d-flex justify-content-between align-items-center">
    
    <div class="d-flex align-items-center">
        <button @click="sidebarOpen = !sidebarOpen" class="btn btn-light d-lg-none me-3 rounded-circle" style="width: 40px; height: 40px;">
            <i class="bi bi-list"></i>
        </button>
        
        <!-- Global Admin Search -->
        <div x-data="{ ...advancedSearch(), adminMode: true }"
             class="input-group d-none d-md-flex position-relative" style="width: 300px;"
             @click.away="_closeDropdown()"
             role="combobox"
             aria-haspopup="listbox"
             :aria-expanded="showDropdown">
            
            <form class="w-100 position-relative d-flex" @submit.prevent="submitSearch">
                <span class="input-group-text bg-light border-end-0 rounded-start-pill text-muted">
                    <i class="bi bi-search"></i>
                </span>
                <input type="search"
                       class="form-control bg-light border-start-0 rounded-end-pill shadow-none"
                       placeholder="Search products..."
                       autocomplete="off"
                       spellcheck="false"
                       x-model="query"
                       @input="fetchSuggestions"
                       @keydown="handleKeydown"
                       @focus="query.trim().length >= 1 && (showDropdown = true)">
            </form>

            <!-- Dropdown -->
            <div x-show="showDropdown" x-cloak class="search-dropdown" style="top: 100%; min-width: 300px; z-index: 1050;">
                <div x-show="loading" class="search-dropdown-loading">
                    <div class="spinner-border spinner-border-sm text-secondary"></div>
                    <span class="ms-2">Searching...</span>
                </div>
                <div x-show="!loading && results.length === 0 && query.trim().length >= 1" class="search-dropdown-empty p-3 text-muted text-center">
                    No products found.
                </div>
                <ul x-show="!loading && results.length > 0" class="search-results-list list-unstyled mb-0 w-100">
                    <template x-for="(item, index) in results" :key="item.id">
                        <li>
                            <a class="search-result-item d-flex align-items-center gap-3 p-2 text-decoration-none text-dark"
                               :class="{ 'bg-light': activeIndex === index }"
                               href="#"
                               @click.prevent="navigateTo(item.slug, item.id)"
                               @mouseenter="activeIndex = index">
                                <img :src="item.imageUrl" :alt="item.name" class="rounded object-fit-cover" style="width: 40px; height: 40px;"
                                     onerror="this.src='https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=100&auto=format&fit=crop'">
                                <div class="flex-grow-1 overflow-hidden">
                                    <div class="fw-semibold text-truncate" style="font-size: 0.85rem;" x-text="item.name"></div>
                                    <div class="text-muted d-flex gap-2" style="font-size: 0.75rem;">
                                        <span x-text="item.categoryName"></span>
                                    </div>
                                </div>
                                <div class="text-end">
                                    <div class="fw-bold text-primary" style="font-size: 0.85rem;" x-text="formatPrice(item.price)"></div>
                                </div>
                            </a>
                        </li>
                    </template>
                </ul>
            </div>
        </div>
    </div>
    
    <div class="d-flex align-items-center gap-3">
        <a href="#" class="btn btn-light rounded-circle position-relative" style="width: 40px; height: 40px;">
            <i class="bi bi-bell"></i>
            <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle">
                <span class="visually-hidden">New alerts</span>
            </span>
        </a>
        
        <div class="dropdown">
            <button class="btn btn-light rounded-pill px-3 d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                <div class="bg-dark text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 24px; height: 24px; font-size: 0.7rem;">
                    <span th:text="${#authentication.principal.username.substring(0,1).toUpperCase()}">A</span>
                </div>
                <span class="fw-semibold small d-none d-sm-block" th:text="${#authentication.principal.username.split('@')[0]}">Admin</span>
                <i class="bi bi-chevron-down small text-muted"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-3 mt-2">
                <li><a class="dropdown-item" href="/account/profile"><i class="bi bi-person me-2"></i>My Profile</a></li>
                <li><a class="dropdown-item" href="/account/settings"><i class="bi bi-gear me-2"></i>Settings</a></li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="dropdown-item text-danger"><i class="bi bi-box-arrow-right me-2"></i>Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</div>
</html>
