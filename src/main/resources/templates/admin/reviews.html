<!DOCTYPE html>
<html lang="en" th:replace="~{layouts/main :: layout(title='Admin - Reviews Moderation - JK1', content=~{::section}, styles=~{}, scripts=~{})}">
<section class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold font-poppins mb-0">Reviews Moderation</h2>
    </div>

    <div class="row g-4 mb-5">
        <!-- Reported Reviews -->
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm rounded-4 h-100 border-danger border-top border-4">
                <div class="card-header bg-transparent border-0 pt-4 pb-0 px-4">
                    <h5 class="fw-bold text-danger mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Reported Reviews</h5>
                </div>
                <div class="card-body p-4">
                    <div class="list-group list-group-flush">
                        <div th:each="rev : ${reportedReviews}" class="list-group-item px-0 py-3 border-bottom">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <div>
                                    <h6 class="mb-1 fw-bold" th:text="${rev.product.name}">Product Name</h6>
                                    <small class="text-muted">By <span th:text="${rev.user.name}"></span></small>
                                </div>
                                <div class="d-flex gap-2">
                                    <form th:action="@{/admin/reviews/{id}/approve(id=${rev.id})}" method="post">
                                        <button type="submit" class="btn btn-sm btn-outline-success">Keep</button>
                                    </form>
                                    <form th:action="@{/admin/reviews/{id}/delete(id=${rev.id})}" method="post">
                                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                                    </form>
                                </div>
                            </div>
                            <p class="mb-1 small text-dark" th:text="${rev.comment}">Review content</p>
                        </div>
                        <div th:if="${#lists.isEmpty(reportedReviews)}" class="text-center text-muted py-3">No reported reviews.</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pending Reviews -->
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm rounded-4 h-100 border-warning border-top border-4">
                <div class="card-header bg-transparent border-0 pt-4 pb-0 px-4">
                    <h5 class="fw-bold text-warning mb-0"><i class="bi bi-hourglass-split me-2"></i>Pending Moderation</h5>
                </div>
                <div class="card-body p-4">
                    <div class="list-group list-group-flush">
                        <div th:each="rev : ${pendingReviews}" class="list-group-item px-0 py-3 border-bottom">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <div>
                                    <h6 class="mb-1 fw-bold" th:text="${rev.product.name}">Product Name</h6>
                                    <small class="text-muted">By <span th:text="${rev.user.name}"></span></small>
                                </div>
                                <div class="d-flex gap-2">
                                    <form th:action="@{/admin/reviews/{id}/approve(id=${rev.id})}" method="post">
                                        <button type="submit" class="btn btn-sm btn-success">Approve</button>
                                    </form>
                                    <form th:action="@{/admin/reviews/{id}/reject(id=${rev.id})}" method="post">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">Reject</button>
                                    </form>
                                </div>
                            </div>
                            <p class="mb-1 small text-dark" th:text="${rev.comment}">Review content</p>
                        </div>
                        <div th:if="${#lists.isEmpty(pendingReviews)}" class="text-center text-muted py-3">No pending reviews.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
