<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: html(title='Reviews | JKØ', activeTab='reviews', content=~{::content})}">
<head>
    <title>Reviews</title>
</head>
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0" style="font-family: 'Playfair Display', serif; letter-spacing: 1px;">Customer Reviews</h3>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="bg-light text-uppercase text-muted" style="font-size: 0.75rem; letter-spacing: 1px;">
                        <tr>
                            <th class="py-3 px-4 fw-semibold border-0" style="min-width: 200px;">Product</th>
                            <th class="py-3 fw-semibold border-0">Review</th>
                            <th class="py-3 fw-semibold border-0">Rating</th>
                            <th class="py-3 fw-semibold border-0">Status</th>
                            <th class="py-3 px-4 fw-semibold border-0 text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="review : ${reviewPage.content}">
                            <td class="py-3 px-4">
                                <div class="fw-bold" th:text="${review.product.name}">Product Name</div>
                                <small class="text-muted" th:text="${'By ' + review.user.firstName + ' ' + review.user.lastName}">By Customer</small>
                            </td>
                            <td class="py-3">
                                <p class="mb-0 small text-truncate" style="max-width: 300px;" th:text="${review.comment}">Comment goes here...</p>
                            </td>
                            <td class="py-3 text-warning">
                                <i class="bi bi-star-fill" th:each="i : ${#numbers.sequence(1, review.rating)}"></i>
                                <i class="bi bi-star" th:each="i : ${#numbers.sequence(review.rating + 1, 5)}" th:if="${review.rating < 5}"></i>
                            </td>
                            <td class="py-3">
                                <span class="badge rounded-pill px-3 py-2 fw-semibold"
                                      th:classappend="${review.reviewStatus.name() == 'APPROVED' ? 'bg-success' : (review.reviewStatus.name() == 'REJECTED' ? 'bg-danger' : 'bg-warning text-dark')}"
                                      th:text="${review.reviewStatus}">PENDING</span>
                            </td>
                            <td class="py-3 px-4 text-end">
                                <div class="d-flex justify-content-end gap-1">
                                    <form th:action="@{/admin/reviews/{id}/approve(id=${review.id})}" method="post" th:if="${review.reviewStatus.name() != 'APPROVED'}">
                                        <button type="submit" class="btn btn-sm btn-outline-success rounded-circle" title="Approve"><i class="bi bi-check-lg"></i></button>
                                    </form>
                                    <form th:action="@{/admin/reviews/{id}/reject(id=${review.id})}" method="post" th:if="${review.reviewStatus.name() != 'REJECTED'}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger rounded-circle" title="Reject"><i class="bi bi-x-lg"></i></button>
                                    </form>
                                    <a th:href="@{/admin/reviews/delete/{id}(id=${review.id})}" class="btn btn-sm btn-outline-dark rounded-circle" data-confirm="Delete this review forever?" title="Delete"><i class="bi bi-trash"></i></a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${reviewPage.empty}">
                            <td colspan="5" class="text-center py-5 text-muted">No reviews found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="card-footer bg-white border-top py-3" th:if="${reviewPage.totalPages > 1}">
                <nav>
                    <ul class="pagination justify-content-center mb-0">
                        <li class="page-item" th:classappend="${reviewPage.first ? 'disabled' : ''}">
                            <a class="page-link rounded-circle border-0" th:href="@{/admin/reviews(page=${reviewPage.number - 1})}"><i class="bi bi-chevron-left"></i></a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, reviewPage.totalPages - 1)}" th:classappend="${reviewPage.number == i ? 'active' : ''}">
                            <a class="page-link rounded-circle border-0 mx-1" th:href="@{/admin/reviews(page=${i})}" th:text="${i + 1}" th:classappend="${reviewPage.number == i ? 'bg-dark text-white' : 'text-dark'}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${reviewPage.last ? 'disabled' : ''}">
                            <a class="page-link rounded-circle border-0" th:href="@{/admin/reviews(page=${reviewPage.number + 1})}"><i class="bi bi-chevron-right"></i></a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    
    <!-- JS Integration -->
    <script type="module" th:src="@{/js/app.js}"></script>
    <script type="module" th:src="@{/js/pages/admin/reviews.js}"></script>
    </div>
</body>
</html>
