<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: html(title=${brandDto.id != null ? 'Edit Brand | JKØ' : 'New Brand | JKØ'}, activeTab='brands', content=~{::content})}">
<head>
    <title>Brand Form</title>
</head>
<body>
    <div th:fragment="content">
        <div class="mb-4">
            <a th:href="@{/admin/brands}" class="text-decoration-none text-dark small fw-bold text-uppercase" style="letter-spacing: 1px;">
                <i class="bi bi-arrow-left me-1"></i> Back to Brands
            </a>
        </div>

        <div class="card border-0 shadow-sm rounded-4" style="max-width: 600px;">
            <div class="card-body p-4 p-md-5">
                <h4 class="fw-bold mb-4 text-uppercase" style="letter-spacing: 1px;" th:text="${brandDto.id != null ? 'Edit Brand' : 'Add New Brand'}">Add New Brand</h4>
                
                <form th:action="@{/admin/brands/save}" th:object="${brandDto}" method="post">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="mb-4">
                        <label class="form-label text-uppercase text-muted small fw-semibold">Brand Name</label>
                        <input type="text" class="form-control form-control-lg bg-light border-0 px-4" th:field="*{name}">
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-uppercase text-muted small fw-semibold">Logo URL</label>
                        <input type="text" class="form-control form-control-lg bg-light border-0 px-4" th:field="*{logoUrl}">
                    </div>

                    <div class="mb-5">
                        <label class="form-label text-uppercase text-muted small fw-semibold">Description</label>
                        <textarea class="form-control bg-light border-0 p-4" th:field="*{description}" rows="3"></textarea>
                    </div>

                    <div class="d-flex justify-content-end gap-3">
                        <a th:href="@{/admin/brands}" class="btn btn-light rounded-pill px-4 text-uppercase fw-semibold" style="letter-spacing: 1px;">Cancel</a>
                        <button type="submit" class="btn btn-dark rounded-pill px-5 text-uppercase fw-semibold" style="letter-spacing: 1px;">Save Brand</button>
                    </div>
                </form>
            </div>
        </div>
    
    <!-- JS Integration -->
    <script type="module" th:src="@{/js/app.js}"></script>
    <script type="module" th:src="@{/js/pages/admin/brand-form.js}"></script>
    </div>
</body>
</html>
