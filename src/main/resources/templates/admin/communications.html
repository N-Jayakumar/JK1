<!DOCTYPE html>
<html lang="en" th:replace="~{layouts/main :: layout(title='Admin - Communications - JK1', content=~{::section}, styles=~{}, scripts=~{})}">
<section class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold font-poppins mb-0">Communications Dashboard</h2>
    </div>

    <div class="row g-4 mb-5">
        <!-- Announcements Column -->
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm rounded-4 h-100">
                <div class="card-header bg-transparent border-0 pt-4 pb-0 px-4">
                    <h5 class="fw-bold mb-0">System Announcements</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/communications/announcements}" method="post" class="mb-4 bg-light p-3 rounded-3">
                        <h6 class="fw-bold mb-3">Create New Announcement</h6>
                        <div class="mb-3">
                            <label class="form-label small fw-medium">Title</label>
                            <input type="text" name="title" class="form-control form-control-sm" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-medium">Target Audience</label>
                            <select name="target" class="form-select form-select-sm" required>
                                <option value="ALL">All Users</option>
                                <option value="PREMIUM">Premium Members</option>
                                <option value="SELECTED">Selected Users</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-medium">Content</label>
                            <textarea name="content" class="form-control form-control-sm" rows="3" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm w-100 rounded-pill">Publish Announcement</button>
                    </form>

                    <div class="list-group list-group-flush">
                        <div th:each="ann : ${announcements}" class="list-group-item px-0 py-3 border-bottom">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h6 class="mb-1 fw-bold" th:text="${ann.title}">Title</h6>
                                    <p class="mb-1 small text-muted" th:text="${ann.content}">Content</p>
                                    <span class="badge bg-secondary" th:text="${ann.targetAudience}">Target</span>
                                </div>
                                <form th:action="@{/admin/communications/announcements/{id}/delete(id=${ann.id})}" method="post">
                                    <button type="submit" class="btn btn-sm btn-link text-danger p-0"><i class="bi bi-trash"></i></button>
                                </form>
                            </div>
                        </div>
                        <div th:if="${#lists.isEmpty(announcements)}" class="text-center text-muted py-3">No announcements found.</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Campaigns Column -->
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm rounded-4 h-100">
                <div class="card-header bg-transparent border-0 pt-4 pb-0 px-4">
                    <h5 class="fw-bold mb-0">Promotional Campaigns</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/communications/campaigns}" method="post" class="mb-4 bg-light p-3 rounded-3">
                        <h6 class="fw-bold mb-3">Create New Campaign</h6>
                        <div class="row g-2 mb-2">
                            <div class="col-md-6">
                                <label class="form-label small fw-medium">Campaign Name</label>
                                <input type="text" name="name" class="form-control form-control-sm" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-medium">Type</label>
                                <select name="type" class="form-select form-select-sm" required>
                                    <option value="FESTIVAL">Festival Offer</option>
                                    <option value="FLASH_SALE">Flash Sale</option>
                                    <option value="COUPON">Coupon Campaign</option>
                                    <option value="SEASONAL">Seasonal</option>
                                    <option value="BIRTHDAY">Birthday</option>
                                </select>
                            </div>
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-medium">Start Date</label>
                                <input type="datetime-local" name="startDate" class="form-control form-control-sm" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-medium">End Date</label>
                                <input type="datetime-local" name="endDate" class="form-control form-control-sm" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-medium">Content / Details</label>
                            <textarea name="content" class="form-control form-control-sm" rows="2" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm w-100 rounded-pill">Launch Campaign</button>
                    </form>

                    <div class="list-group list-group-flush">
                        <div th:each="camp : ${campaigns}" class="list-group-item px-0 py-3 border-bottom">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h6 class="mb-1 fw-bold" th:text="${camp.name}">Name</h6>
                                    <span class="badge bg-primary mb-2" th:text="${camp.campaignType}">Type</span>
                                    <p class="mb-0 small text-muted">
                                        <i class="bi bi-calendar me-1"></i>
                                        <span th:text="${#temporals.format(camp.startDate, 'MMM dd')}"></span> - 
                                        <span th:text="${#temporals.format(camp.endDate, 'MMM dd')}"></span>
                                    </p>
                                </div>
                                <form th:action="@{/admin/communications/campaigns/{id}/delete(id=${camp.id})}" method="post">
                                    <button type="submit" class="btn btn-sm btn-link text-danger p-0"><i class="bi bi-trash"></i></button>
                                </form>
                            </div>
                        </div>
                        <div th:if="${#lists.isEmpty(campaigns)}" class="text-center text-muted py-3">No campaigns found.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
