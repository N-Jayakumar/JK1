<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: html(title=${couponDto.id != null ? 'Edit Coupon | JKØ' : 'New Coupon | JKØ'}, activeTab='coupons', content=~{::content})}">
<head>
    <title>Coupon Form</title>
</head>
<body>
    <div th:fragment="content" x-data="{ type: '[[${couponDto.couponType != null ? couponDto.couponType : 'PERCENTAGE'}]]' }">
        <div class="mb-4">
            <a th:href="@{/admin/coupons}" class="text-decoration-none text-dark small fw-bold text-uppercase" style="letter-spacing: 1px;">
                <i class="bi bi-arrow-left me-1"></i> Back to Coupons
            </a>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <h4 class="fw-bold mb-4 text-uppercase" style="letter-spacing: 1px;" th:text="${couponDto.id != null ? 'Edit Coupon' : 'Create Coupon'}">Create Coupon</h4>
                
                <form th:action="@{/admin/coupons/save}" th:object="${couponDto}" method="post">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label text-uppercase text-muted small fw-semibold">Coupon Code</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0 px-4 font-monospace fw-bold text-uppercase" th:field="*{code}" placeholder="e.g. SUMMER20">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('code')}" th:errors="*{code}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-uppercase text-muted small fw-semibold">Coupon Type</label>
                            <select class="form-select form-select-lg bg-light border-0 px-4" th:field="*{couponType}" x-model="type">
                                <option th:each="t : ${T(com.jk1.entity.enums.CouponType).values()}" th:value="${t}" th:text="${t}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-4 mb-4" x-show="type === 'PERCENTAGE'">
                        <div class="col-md-6">
                            <label class="form-label text-uppercase text-muted small fw-semibold">Discount Percentage (%)</label>
                            <input type="number" class="form-control form-control-lg bg-light border-0 px-4" th:field="*{discountPercentage}" min="0" max="100">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('discountPercentage')}" th:errors="*{discountPercentage}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-uppercase text-muted small fw-semibold">Maximum Discount Amount ($)</label>
                            <input type="number" step="0.01" class="form-control form-control-lg bg-light border-0 px-4" th:field="*{maxDiscountAmount}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('maxDiscountAmount')}" th:errors="*{maxDiscountAmount}"></div>
                        </div>
                    </div>

                    <div class="row g-4 mb-4" x-show="type === 'FIXED_AMOUNT'">
                        <div class="col-md-6">
                            <label class="form-label text-uppercase text-muted small fw-semibold">Discount Amount ($)</label>
                            <input type="number" step="0.01" class="form-control form-control-lg bg-light border-0 px-4" th:field="*{discountAmount}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('discountAmount')}" th:errors="*{discountAmount}"></div>
                        </div>
                    </div>

                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label text-uppercase text-muted small fw-semibold">Minimum Purchase ($)</label>
                            <input type="number" step="0.01" class="form-control form-control-lg bg-light border-0 px-4" th:field="*{minPurchaseAmount}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-uppercase text-muted small fw-semibold">Expiry Date</label>
                            <input type="datetime-local" class="form-control form-control-lg bg-light border-0 px-4" th:field="*{expiryDate}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('expiryDate')}" th:errors="*{expiryDate}"></div>
                        </div>
                    </div>
                    
                    <div class="row g-4 mb-5">
                        <div class="col-md-6">
                            <label class="form-label text-uppercase text-muted small fw-semibold">Usage Limit</label>
                            <input type="number" class="form-control form-control-lg bg-light border-0 px-4" th:field="*{usageLimit}">
                        </div>
                        <div class="col-md-6 d-flex align-items-center pt-4">
                            <div class="form-check form-switch fs-5">
                                <input class="form-check-input" type="checkbox" role="switch" id="activeSwitch" th:field="*{active}">
                                <label class="form-check-label ms-2 text-uppercase text-muted small fw-semibold" for="activeSwitch" style="font-size: 0.8rem;">Is Active</label>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-3">
                        <a th:href="@{/admin/coupons}" class="btn btn-light rounded-pill px-4 text-uppercase fw-semibold" style="letter-spacing: 1px;">Cancel</a>
                        <button type="submit" class="btn btn-dark rounded-pill px-5 text-uppercase fw-semibold" style="letter-spacing: 1px;">Save Coupon</button>
                    </div>
                </form>
            </div>
        </div>
    
    <!-- JS Integration -->
    <script type="module" th:src="@{/js/app.js}"></script>
    <script type="module" th:src="@{/js/pages/admin/coupon-form.js}"></script>
    </div>
</body>
</html>
