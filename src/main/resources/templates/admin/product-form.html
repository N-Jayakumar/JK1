<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: html(title=${productDto.id != null ? 'Edit Product | JKØ' : 'New Product | JKØ'}, activeTab='products', content=~{::content})}">
<head>
    <title>Product Form</title>
</head>
<body>
    <div th:fragment="content" x-data="productForm" th:data-attributes="${productDto != null ? productDto.attributes : '{}^'}">
        <div class="mb-4">
            <a th:href="@{/admin/products}" class="text-decoration-none text-dark small fw-bold text-uppercase" style="letter-spacing: 1px;">
                <i class="bi bi-arrow-left me-1"></i> Back to Products
            </a>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <h4 class="fw-bold mb-4 text-uppercase" style="letter-spacing: 1px;" th:text="${productDto.id != null ? 'Edit Product' : 'Add New Product'}">Add New Product</h4>
                
                <form th:action="@{/admin/products/save}" th:object="${productDto}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label text-uppercase text-muted small fw-semibold">Product Name</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0 px-4" th:field="*{name}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-uppercase text-muted small fw-semibold">SKU</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0 px-4" th:field="*{sku}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('sku')}" th:errors="*{sku}"></div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-uppercase text-muted small fw-semibold">Description</label>
                        <textarea class="form-control bg-light border-0 p-4" th:field="*{description}" rows="4"></textarea>
                    </div>

                    <div class="row g-4 mb-4">
                        <div class="col-md-4">
                            <label class="form-label text-uppercase text-muted small fw-semibold">Price ($)</label>
                            <input type="number" step="0.01" class="form-control form-control-lg bg-light border-0 px-4" th:field="*{price}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-uppercase text-muted small fw-semibold">Status</label>
                            <select class="form-select form-select-lg bg-light border-0 px-4" th:field="*{productStatus}">
                                <option value="ACTIVE">Active</option>
                                <option value="DRAFT">Draft</option>
                                <option value="ARCHIVED">Archived</option>
                            </select>
                        </div>
                        <div class="col-md-4" th:if="${productDto.id == null}">
                            <label class="form-label text-uppercase text-muted small fw-semibold">Initial Stock</label>
                            <input type="number" class="form-control form-control-lg bg-light border-0 px-4" th:field="*{initialQuantity}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('initialQuantity')}" th:errors="*{initialQuantity}"></div>
                        </div>
                    </div>

                    <div class="row g-4 mb-5">
                        <div class="col-md-6">
                            <label class="form-label text-uppercase text-muted small fw-semibold">Category</label>
                            <select class="form-select form-select-lg bg-light border-0 px-4" th:field="*{categoryId}" @change="updateAttributes($event.target.options[$event.target.selectedIndex].text)">
                                <option value="">Select Category</option>
                                <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
                            </select>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-uppercase text-muted small fw-semibold">Brand</label>
                            <select class="form-select form-select-lg bg-light border-0 px-4" th:field="*{brandId}">
                                <option value="">Select Brand</option>
                                <option th:each="brand : ${brands}" th:value="${brand.id}" th:text="${brand.name}"></option>
                            </select>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('brandId')}" th:errors="*{brandId}"></div>
                        </div>
                    </div>
                    
                    <!-- Dynamic Attributes via Alpine.js -->
                    <div class="mb-5 p-4 bg-light rounded-4" x-show="Object.keys(requiredAttributes).length > 0">
                        <h6 class="fw-bold text-uppercase mb-3" style="letter-spacing: 1px; font-size: 0.8rem;">Product Attributes</h6>
                        <div class="row g-3">
                            <template x-for="(attr, index) in requiredAttributes" :key="index">
                                <div class="col-md-4">
                                    <label class="form-label text-uppercase text-muted small fw-semibold" x-text="attr"></label>
                                    <input type="text" class="form-control bg-white border-0" :name="'attributes[' + attr + ']'" x-model="attributesData[attr]">
                                </div>
                            </template>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-3">
                        <a th:href="@{/admin/products}" class="btn btn-light rounded-pill px-4 text-uppercase fw-semibold" style="letter-spacing: 1px;">Cancel</a>
                        <button type="submit" class="btn btn-dark rounded-pill px-5 text-uppercase fw-semibold" style="letter-spacing: 1px;">Save Product</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Inline script for Alpine data -->
    <!-- JS Integration -->
    <script type="module" th:src="@{/js/app.js}"></script>
    <script type="module" th:src="@{/js/pages/admin/product-form.js}"></script>
</body>
</html>
