<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: html(title='Admin Dashboard | JKØ', activeTab='dashboard', content=~{::content})}">
<head>
    <title>Dashboard</title>
</head>
<body>
    <div th:fragment="content">
        <h3 class="fw-bold mb-4" style="font-family: 'Playfair Display', serif; letter-spacing: 1px;">Overview</h3>

        <div class="row g-4 mb-5">
            <div class="col-md-3">
                <div class="card border-0 bg-dark text-white rounded-4 h-100">
                    <div class="card-body p-4">
                        <i class="bi bi-box-seam fs-1 opacity-50 mb-3 d-block"></i>
                        <h5 class="fw-bold mb-1" th:text="${totalProducts}">0</h5>
                        <p class="small text-uppercase mb-0 opacity-75" style="letter-spacing: 1px;">Total Products</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 bg-light rounded-4 h-100">
                    <div class="card-body p-4">
                        <i class="bi bi-tags fs-1 text-muted mb-3 d-block"></i>
                        <h5 class="fw-bold mb-1" th:text="${totalCategories}">0</h5>
                        <p class="small text-uppercase mb-0 text-muted" style="letter-spacing: 1px;">Categories</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 bg-light rounded-4 h-100">
                    <div class="card-body p-4">
                        <i class="bi bi-award fs-1 text-muted mb-3 d-block"></i>
                        <h5 class="fw-bold mb-1" th:text="${totalBrands}">0</h5>
                        <p class="small text-uppercase mb-0 text-muted" style="letter-spacing: 1px;">Brands</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 bg-secondary text-white rounded-4 h-100">
                    <div class="card-body p-4">
                        <i class="bi bi-bag-check fs-1 opacity-50 mb-3 d-block"></i>
                        <h5 class="fw-bold mb-1" th:text="${totalOrders}">0</h5>
                        <p class="small text-uppercase mb-0 opacity-75" style="letter-spacing: 1px;">Total Orders</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white border-bottom p-4">
                        <h6 class="fw-bold text-uppercase mb-0" style="letter-spacing: 1px;">Low Stock Alerts</h6>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <tbody>
                                    <tr th:each="inventory : ${lowStockItems}">
                                        <td class="p-4" th:text="${inventory.product.name}">Product Name</td>
                                        <td class="p-4 text-end">
                                            <span class="badge bg-warning text-dark rounded-pill px-3" th:text="${inventory.quantity} + ' Left'">5 Left</span>
                                        </td>
                                    </tr>
                                    <tr th:if="${lowStockItems == null || lowStockItems.isEmpty()}">
                                        <td class="p-4 text-center text-muted py-5" colspan="2">No low stock items</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white border-bottom p-4">
                        <h6 class="fw-bold text-danger text-uppercase mb-0" style="letter-spacing: 1px;">Out of Stock</h6>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <tbody>
                                    <tr th:each="inventory : ${outOfStockItems}">
                                        <td class="p-4" th:text="${inventory.product.name}">Product Name</td>
                                        <td class="p-4 text-end">
                                            <span class="badge bg-danger rounded-pill px-3">0 Left</span>
                                        </td>
                                    </tr>
                                    <tr th:if="${outOfStockItems == null || outOfStockItems.isEmpty()}">
                                        <td class="p-4 text-center text-muted py-5" colspan="2">No out of stock items</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    
    <!-- JS Integration -->
    <script type="module" th:src="@{/js/app.js}"></script>
    <script type="module" th:src="@{/js/pages/admin/dashboard.js}"></script>
    </div>
</body>
</html>
