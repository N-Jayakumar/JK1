<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: html(title='Notifications | JKØ', activeTab='notifications', content=~{::content})}">
<head>
    <title>Notifications</title>
</head>
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0" style="font-family: 'Playfair Display', serif; letter-spacing: 1px;">System Notifications</h3>
            <button class="btn btn-dark rounded-pill px-4 text-uppercase fw-semibold" style="letter-spacing: 1px; font-size: 0.8rem;" data-bs-toggle="modal" data-bs-target="#sendNotificationModal">
                <i class="bi bi-send me-2"></i>Send Alert
            </button>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="bg-light text-uppercase text-muted" style="font-size: 0.75rem; letter-spacing: 1px;">
                        <tr>
                            <th class="py-3 px-4 fw-semibold border-0">Date</th>
                            <th class="py-3 fw-semibold border-0">Title</th>
                            <th class="py-3 fw-semibold border-0">Type</th>
                            <th class="py-3 px-4 fw-semibold border-0 text-end">Recipient</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="notif : ${notifications}">
                            <td class="py-3 px-4 text-muted small" th:text="${#temporals.format(notif.createdAt, 'MMM dd, yyyy HH:mm')}">Date</td>
                            <td class="py-3">
                                <div class="fw-bold" th:text="${notif.title}">Title</div>
                                <small class="text-muted d-block text-truncate" style="max-width: 300px;" th:text="${notif.message}">Message</small>
                            </td>
                            <td class="py-3">
                                <span class="badge bg-secondary rounded-pill px-3 py-1 fw-normal" th:text="${notif.notificationType}">TYPE</span>
                            </td>
                            <td class="py-3 px-4 text-end text-muted small" th:text="${notif.user.email}">user@example.com</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(notifications)}">
                            <td colspan="4" class="text-center py-5 text-muted">No notifications sent yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Send Modal -->
        <div class="modal fade" id="sendNotificationModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content rounded-4 border-0 shadow">
                    <div class="modal-header border-0 p-4 pb-0">
                        <h5 class="modal-title fw-bold text-uppercase" style="letter-spacing: 1px;">Send Notification</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/admin/notifications/send}" method="post">
                        <div class="modal-body p-4">
                            <div class="mb-3">
                                <label class="form-label text-uppercase text-muted small fw-semibold">Title</label>
                                <input type="text" name="title" class="form-control bg-light border-0" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-uppercase text-muted small fw-semibold">Type</label>
                                <select name="type" class="form-select bg-light border-0">
                                    <option th:each="t : ${T(com.jk1.entity.enums.NotificationType).values()}" th:value="${t}" th:text="${t}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-uppercase text-muted small fw-semibold">Recipient ID (Leave blank for ALL users)</label>
                                <input type="number" name="userId" class="form-control bg-light border-0" placeholder="e.g. 1">
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-uppercase text-muted small fw-semibold">Message</label>
                                <textarea name="message" class="form-control bg-light border-0" rows="3" required></textarea>
                            </div>
                        </div>
                        <div class="modal-footer border-0 p-4 pt-0">
                            <button type="button" class="btn btn-light rounded-pill px-4 text-uppercase fw-semibold" style="letter-spacing: 1px;" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-dark rounded-pill px-4 text-uppercase fw-semibold" style="letter-spacing: 1px;">Send Alert</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    
    <!-- JS Integration -->
    <script type="module" th:src="@{/js/app.js}"></script>
    <script type="module" th:src="@{/js/pages/admin/notifications.js}"></script>
    </div>
</body>
</html>
