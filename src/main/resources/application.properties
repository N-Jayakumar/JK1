# Active Profile
spring.profiles.active=local

# Application Name
spring.application.name=jk1

# Encoding
spring.mandatory-file-encoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Time Zone support
spring.jackson.time-zone=UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Auto-configuration enabled for repositories

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,env,beans,mappings,threaddump,heapdump
management.endpoint.health.show-details=always

# Loyalty & Rewards Configuration
loyalty.conversion.rate=0.10
loyalty.points.signup=500
loyalty.points.review=50
loyalty.tier.silver=5000
loyalty.tier.gold=15000
loyalty.tier.platinum=50000
