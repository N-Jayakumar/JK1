services:
  - type: web
    name: jk1-app
    env: docker
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://jk1-mysql:3306/jk1_dev?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
      - key: SPRING_DATASOURCE_USERNAME
        value: jk1
      - key: SPRING_DATASOURCE_PASSWORD
        fromService:
          type: pserv
          name: jk1-mysql
          envVarKey: MYSQL_PASSWORD
  - type: pserv
    name: jk1-mysql
    env: image
    image:
      url: mysql:8.0
      - key: MYSQL_DATABASE
        value: jk1_dev
      - key: MYSQL_USER
        value: jk1
      - key: MYSQL_PASSWORD
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
