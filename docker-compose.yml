services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jk1-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://jk1-mysql:3306/jk1_dev?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      - SPRING_DATASOURCE_USERNAME=jk1
      - SPRING_DATASOURCE_PASSWORD=jk1password
      - PORT=8080
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jk1-network

  mysql:
    image: mysql:8.0
    container_name: jk1-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=jk1_dev
      - MYSQL_USER=jk1
      - MYSQL_PASSWORD=jk1password
      - MYSQL_ROOT_PASSWORD=rootpassword
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jk1-network

volumes:
  db_data:

networks:
  jk1-network:
    driver: bridge
